<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    
    <!-- SEO Meta Tags -->
    <title>Planify - Smart Subscription & Finance Manager</title>
    <meta name="description" content="Planify is your all-in-one productivity app for managing subscriptions, planning daily activities, and securely storing passwords. Take control of your finances and time." />
    <meta name="keywords" content="subscription manager, password vault, daily planner, finance tracker, productivity app, PWA" />
    <meta name="author" content="Planify" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Planify - Smart Subscription & Finance Manager" />
    <meta property="og:description" content="Manage subscriptions, plan activities, and secure passwords in one beautiful app." />
    <meta property="og:image" content="/icon.svg" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Planify - Smart Manager" />
    <meta name="twitter:description" content="Manage subscriptions, plan activities, and secure passwords" />
    <meta name="twitter:image" content="/icon.svg" />
    
    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Planify" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#8b5cf6" />
    <meta name="msapplication-TileImage" content="/icon.svg" />
    
    <!-- Prevent zoom on input focus for iOS -->
    <style>
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
